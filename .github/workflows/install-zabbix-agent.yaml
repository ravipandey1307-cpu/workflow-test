name: Install Zabbix Agent on Rocky Linux

on:
  workflow_dispatch:

jobs:
  install-zabbix-agent:
    runs-on: self-hosted

    steps:
      - name: Install Zabbix repository
        run: |
          sudo rpm -Uvh https://repo.zabbix.com/zabbix/7.0/rocky/9/x86_64/zabbix-release-latest-7.0.el9.noarch.rpm

      - name: Refresh DNF cache
        run: |
          sudo dnf clean all
          sudo dnf makecache

      - name: Install Zabbix Agent
        run: |
          sudo dnf install -y zabbix-agent

      - name: Configure Zabbix Agent
        run: |
          sudo sed -i 's/^Server=.*/Server=YOUR_ZABBIX_SERVER_IP/' /etc/zabbix/zabbix_agentd.conf
          sudo sed -i 's/^ServerActive=.*/ServerActive=YOUR_ZABBIX_SERVER_IP/' /etc/zabbix/zabbix_agentd.conf
          sudo sed -i "s/^Hostname=.*/Hostname=$(hostname)/" /etc/zabbix/zabbix_agentd.conf

      - name: Enable and start service
        run: |
          sudo systemctl enable zabbix-agent
          sudo systemctl restart zabbix-agent
          sudo systemctl status zabbix-agent --no-pager
